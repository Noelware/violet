platforms = ["gha:ubuntu-24.04", "gha:macos-26"]
bazel = ["8.x", "9.x"]

[[task]]
name         = "[build] ensure everything compiles"
docker.image = "ghcr.io/noelware/violet/ci:clang-22"
cmd          = "${{bazel}} build --config=ci --config=cxx26 --action_env=CC --action_env=CXX //violet/..."

[[task]]
name         = "[test] ensure all tests are valid"
docker.image = "ghcr.io/noelware/violet/ci:clang-22"
cmd          = "${{bazel}} test --config=ci --config=cxx26 --action_env=CC --action_env=CXX //violet/..."
