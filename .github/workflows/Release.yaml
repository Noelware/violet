name: Release
on:
    release:
        types:
          - published
jobs:
    distribution:
        name: "Distribution"
        runs-on: ubuntu-latest
        container:
            # TODO(@auguwu/Noel): switch to `cr.noelware.cloud/ci/base` once available
            image: ghcr.io/noelware/violet/ci:clang-21@sha256:962751c8ac4a3f4390a14754a73427ed598b6a2ca75750eefdf25daf01c48fd8
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - run: ./tools/bazeldist
            - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
              with:
                files: ${{github.workspace}}/bazeldist.tgz

            - run: ./distribution/meson
            - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
              with:
                files: ${{github.workspace}}/mesondist.tgz

            - run: python3 ./tools/hotpatch-release.py
              env:
                GITHUB_TOKEN: ${{github.token}}
