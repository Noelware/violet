name: "Linux / CI"
on:
    workflow_dispatch: {}
    push:
        branches:
            - 'issues/gh-**'
            - 'feat/**'
            - master

        paths-ignore:
            - '.github/**'
            - '.vscode/**'
            - 'hack/**'
            - '.ci/**'
            - 'nix/**'
            - 'docs/**'

            - 'tools/bazeldist'
            - 'tools/hotpatch-release.py'

            - .noeldoc.yml
            - CHANGELOG.md
            - renovate.json
            - flake.lock
            - .*ignore
            - .clangd
            - .envrc
    pull_request:
        types: [opened, synchronize]
        branches:
            - 'issues/gh-**'
            - 'noel/**'
            - 'feat/**'
            - master
        paths:
            - '**'
permissions:
    contents: read
    checks: write
concurrency:
    group: ${{github.workflow}}-${{github.ref}}
    cancel-in-progress: true
jobs:
    # This will exhaustively test Violet with different feature configurations with and without RTTI and exceptions
    bazel-abseil:
        name: "Bazel / Feature Configuration [exceptions=${{matrix.exceptions}} rtti=${{matrix.rtti}} abseil=${{matrix.abseil}}]"
        runs-on: ubuntu-24.04
        container:
            image: ghcr.io/noelware/violet/ci:clang-22@sha256:6c057a06ae07ede419511e92a1b7ae4597a202aa9742b5e94fbd2ce233a0ec21
        strategy:
            fail-fast: false
            matrix:
                exceptions: ["yes", "no"]
                abseil: ["yes", "no"]
                rtti: ["yes", "no"]
        env:
            USE_BAZEL_VERSION: "8.6.0"
            BAZELFLAGS: "--config=ci --config=cxx26 --action_env=CC --action_env=CXX --cxxopt=${{matrix.exceptions == 'yes' && '-fexceptions' || '-fno-exceptions'}} --host_cxxopt=${{matrix.exceptions == 'yes' && '-fexceptions' || '-fno-exceptions'}} --cxxopt=${{matrix.rtti == 'yes' && '-frtti' || '-fno-rtti'}} --host_cxxopt=${{matrix.rtti == 'yes' && '-frtti' || '-fno-rtti'}} ${{matrix.abseil == 'yes' && '--//buildsystem/bazel/flags:abseil=True' || ''}}"
            CXX: "clang++-22"
            CC: "clang-22"
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true # avoid installing Bazel each time
                repository-cache: true # cache repositories in `MODULE.bazel`
                disk-cache: linux-${{matrix.exceptions == 'yes' && 'exceptions' || 'no-exceptions'}}-${{matrix.rtti == 'yes' && 'rtti' || 'nortti'}}-${{matrix.abseil == 'yes' && 'abseil' || 'no-abseil'}}

            - run: bazel test //... ${{env.BAZELFLAGS}}

    # This will test compatibility between different compilers.
    bazel-compiler-support:
        name: "Bazel / Compiler Compatibility [compiler=${{matrix.compiler}}]"
        runs-on: ubuntu-24.04
        container:
            image: ghcr.io/noelware/violet/ci:${{matrix.image}}
        strategy:
            fail-fast: false
            matrix:
                compiler:
                    - gcc-15
                    - gcc-14
                    - clang-22-libcxx
                    - clang-22
                    - clang-21
                    - clang-20
                include:
                    - compiler: gcc-16
                      image: gcc-16
                      flags: ""
                      cxx: g++
                      cc: gcc
                    - compiler: gcc-15
                      image: gcc-15
                      flags: ""
                      cxx: g++
                      cc: gcc
                    - compiler: gcc-14
                      image: gcc-14
                      flags: ""
                      cxx: g++
                      cc: gcc
                    - compiler: clang-22-libcxx
                      image: clang-22
                      flags: "--config=libcxx --config=host-libcxx"
                      cxx: clang++-22
                      cc: clang-22
                    - compiler: clang-22
                      image: clang-22
                      flags: ""
                      cxx: clang++-22
                      cc: clang-22
                    - compiler: clang-21
                      image: clang-21
                      flags: ""
                      cxx: clang++-21
                      cc: clang-21
                    - compiler: clang-20
                      image: clang-20
                      flags: ""
                      cxx: clang++-20
                      cc: clang-20
        env:
            USE_BAZEL_VERSION: "8.6.0"
            BAZELFLAGS: "--config=ci --config=cxx26 --action_env=CC --action_env=CXX ${{matrix.flags}}"
            CXX: ${{matrix.cxx}}
            CC: ${{matrix.cc}}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true # avoid installing Bazel each time
                repository-cache: true # cache repositories in `MODULE.bazel`
                disk-cache: linux-cxx-compiler-support-${{matrix.compiler}}

            - run: bazel test //... ${{env.BAZELFLAGS}}

    # Test C++20 and C++23 with builds as well. We exclude C++26 as that is the default
    # for most jobs that don't test this.
    bazel-cxx-standard:
        name: "Bazel / C++ Standard [compiler=${{matrix.compiler}} standard=${{matrix.cxx-standard}}]"
        runs-on: ubuntu-24.04
        container:
            image: ghcr.io/noelware/violet/ci:${{matrix.compiler}}
        strategy:
            fail-fast: false
            matrix:
                cxx-standard: [20, 23]
                compiler:
                    - gcc-16
                    - gcc-15
                    - gcc-14
                    - clang-22
                    - clang-21
                    - clang-20
                include:
                    - compiler: gcc-16
                      flags: ""
                      cxx: g++
                      cc: gcc
                    - compiler: gcc-15
                      flags: ""
                      cxx: g++
                      cc: gcc
                    - compiler: gcc-14
                      flags: ""
                      cxx: g++
                      cc: gcc
                    - compiler: clang-22
                      flags: ""
                      cxx: clang++-22
                      cc: clang-22
                    - compiler: clang-21
                      flags: ""
                      cxx: clang++-21
                      cc: clang-21
                    - compiler: clang-20
                      flags: ""
                      cxx: clang++-20
                      cc: clang-20
        env:
            USE_BAZEL_VERSION: "8.6.0"
            BAZELFLAGS: "--config=ci --config=cxx${{matrix.cxx-standard}} --action_env=CC --action_env=CXX ${{matrix.flags}}"
            CXX: ${{matrix.cxx}}
            CC: ${{matrix.cc}}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true # avoid installing Bazel each time
                repository-cache: true # cache repositories in `MODULE.bazel`
                disk-cache: linux-cxx-standard-${{matrix.compiler}}-cxx${{matrix.cxx-standard}}

            - run: bazel test //... ${{env.BAZELFLAGS}}

    # Run both ASan and UBSan to detect common errors that could've occurred
    asan-ubsan:
        name: "AddressSanitizer / UndefinedBehaviourSanitizer"
        runs-on: ubuntu-24.04
        container:
            image: ghcr.io/noelware/violet/ci:clang-22@sha256:6c057a06ae07ede419511e92a1b7ae4597a202aa9742b5e94fbd2ce233a0ec21
        env:
            USE_BAZEL_VERSION: "8.6.0"
            BAZELFLAGS: "--config=ci --config=cxx26 --config=asan --config=ubsan --action_env=CC --action_env=CXX --test_env=ASAN_SYMBOLIZER_PATH=/usr/bin/llvm-symbolizer-22 --test_env=UBSAN_SYMBOLIZER_PATH=/usr/bin/llvm-symbolizer-22"
            CXX: "clang++-22"
            CC: "clang-22"
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true # avoid installing Bazel each time
                repository-cache: true # cache repositories in `MODULE.bazel`
                disk-cache: linux-asan-ubsan

            - run: bazel test //... ${{env.BAZELFLAGS}}

    tsan:
        name: "ThreadSanitizer"
        runs-on: ubuntu-24.04
        container:
            image: ghcr.io/noelware/violet/ci:clang-22@sha256:6c057a06ae07ede419511e92a1b7ae4597a202aa9742b5e94fbd2ce233a0ec21
        env:
            USE_BAZEL_VERSION: "8.6.0"
            BAZELFLAGS: "--config=ci --config=cxx26 --config=tsan --action_env=CC --action_env=CXX --test_env=TSAN_SYMBOLIZER_PATH=/usr/bin/llvm-symbolizer-22"
            CXX: "clang++-22"
            CC: "clang-22"
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true # avoid installing Bazel each time
                repository-cache: true # cache repositories in `MODULE.bazel`
                disk-cache: linux-asan-ubsan

            - run: bazel test //... ${{env.BAZELFLAGS}}

    meson:
        name: "Meson"
        runs-on: ubuntu-24.04
        container:
            image: ghcr.io/noelware/violet/ci:${{matrix.compiler}}
        strategy:
            fail-fast: false
            matrix:
                compiler: [gcc-16, gcc-15, gcc-14, clang-22, clang-21, clang-20]
                include:
                    - compiler: gcc-16
                      cxx: g++
                      cc: gcc
                    - compiler: gcc-15
                      cxx: g++
                      cc: gcc
                    - compiler: gcc-14
                      cxx: g++
                      cc: gcc
                    - compiler: clang-22
                      cxx: clang++-22
                      cc: clang-22
                    - compiler: clang-21
                      cxx: clang++-21
                      cc: clang-21
                    - compiler: clang-20
                      cxx: clang++-20
                      cc: clang-20
        env:
            CXX: ${{matrix.cxx}}
            CC: ${{matrix.cc}}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - run: meson setup build --fatal-meson-warnings
            - run: meson compile -C build
            - run: meson install --destdir ./install -C build
