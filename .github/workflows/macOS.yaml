name: "macOS / CI"
on:
    workflow_dispatch: {}
    push:
        branches:
            - 'issues/gh-**'
            - 'feat/**'
            - master

        paths-ignore:
            - '.github/**'
            - '.vscode/**'
            - 'hack/**'
            - '.ci/**'
            - 'nix/**'

            - 'tools/bazeldist'
            - 'tools/hotpatch-release.py'

            - CHANGELOG.md
            - renovate.json
            - flake.lock
            - .*ignore
            - .clangd
            - .envrc
    pull_request:
        types: [opened, synchronize]
        branches:
            - 'issues/gh-**'
            - 'noel/**'
            - 'feat/**'
            - master
        paths:
            - '**'
permissions:
    contents: read
    checks: write
concurrency:
    group: ${{github.workflow}}-${{github.ref}}
    cancel-in-progress: true
jobs:
    bazel:
        name: "Bazel [exceptions=${{matrix.exceptions}} rtti=${{matrix.rtti}}]"
        runs-on: macos-26
        strategy:
            fail-fast: false
            matrix:
                exceptions: ["yes", "no"]
                rtti: ["yes", "no"]
        env:
            USE_BAZEL_VERSION: "8.6.0"
            BAZELFLAGS: "--config=ci --config=cxx26 --action_env=SDKROOT"
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-macos
            - uses: bazel-contrib/setup-bazel@0.19.0
              with:
                bazelisk-cache: true
                repository-cache: true
                disk-cache: macos-${{matrix.exceptions == 'yes' && 'exceptions' || 'no-exceptions'}}-${{matrix.exceptions == 'yes' && 'rtti' || 'nortti'}}
            - run: bazel test //... ${{env.BAZELFLAGS}}
